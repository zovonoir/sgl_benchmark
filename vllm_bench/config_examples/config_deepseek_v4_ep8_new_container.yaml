# Local DeepSeek-V4-Pro vLLM TP8 benchmark in a fresh Docker container.
image: "sabreshao/vllm:dsv4_0605"
container_name: "zov-dsv4-bench-local"
entrypoint: "/bin/bash"
command:
  - "-lc"
  - "while true; do sleep 3600; done"

model_path: "/.cache/huggingface/deepseek-v4-pro"
model_prefix: "deepseek_v4_pro_mtp"
host_model_mount_path: "/mnt"

restart_vllm_server: false
precision: "fp4"
runner_type: "mi355x"
framework: "vllm"
port: 9090
health_timeout: 240

container_env:
  - "HF_HOME=/.cache/huggingface/"
  - "HF_HUB_CACHE=/.cache/huggingface"
  - "SNAP=/.cache/huggingface/deepseek-v4-pro/"
  - "TRANSFORMERS_OFFLINE=1"
  - "VLLM_ROCM_USE_AITER=1"
  - "VLLM_ROCM_USE_AITER_MOE=1"
  - "CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7"
  - "HF_HUB_OFFLINE=1"
  - "PYTHONPATH=/app/vllm:$PYTHONPATH"

extra_container_mounts:
  - "/home/jialzhu:/dockerx"

docker_run_args:
  group_add: ["video"]
  cap_add: ["SYS_PTRACE"]
  security_opt: ["seccomp=unconfined"]
  devices:
    - "/dev/kfd"
    - "/dev/dri"
    - "/dev/dri:/dev/dri"
    - "/dev/kfd:/dev/kfd"
  privileged: true
  ipc_mode: "host"
  network_mode: "host"
  shm_size: "128g"
  tmpfs:
    "/model_ram": "size=1024G,mode=1777"

server_args:
  - "--host localhost"
  - "--dtype auto"
  - "--tensor-parallel-size 8"
  - "--enable-expert-parallel"
  - "--max-num-seqs 128"
  - "--distributed-executor-backend mp"
  - "--trust-remote-code"
  - "--gpu-memory-utilization 0.6"
  - "--moe-backend aiter"
  - "--tokenizer-mode deepseek_v4"
  - "--reasoning-parser deepseek_v4"
  - "--kv-cache-dtype fp8"
  - "--compilation-config '{\"mode\":3,\"cudagraph_mode\":\"FULL_AND_PIECEWISE\",\"pass_config\":{\"fuse_allreduce_rms\":true}}'"

random_range_ratio: 1.0
request_rate: "inf"
burstiness: 1.0
num_warmups: 2
benchmark_ignore_eos: true

profile_configs:
  - concurrency: 1
    isl: 102400
    osl: 5
    num_prompts: 1
    profile_with_stack: true

test_configs:
  - concurrency: 128
    isl: 8192
    osl: 1024
    num_prompts: 256

  - concurrency: 1
    isl: 102400
    osl: 1
    num_prompts: 4

  - concurrency: 2
    isl: 102400
    osl: 1
    num_prompts: 4

  - concurrency: 4
    isl: 102400
    osl: 1
    num_prompts: 4
