# DeepSeek-V4-Pro vLLM TP8 long-form generation using perf_acc_base1 image with MTP.
image: "vllm/vllm-openai-rocm:perf_acc_base1"
container_name: "vllm-bench-dsv4-longform"
entrypoint: "/bin/bash"
command:
  - "-lc"
  - "while true; do sleep 3600; done"

model_path: "deepseek-ai/DeepSeek-V4-Pro"
model_prefix: "deepseek_v4_pro_mtp"
host_model_mount_path: "/home/sabre/model"

run_mode: "longform"
precision: "fp4"
runner_type: "mi355x"
framework: "vllm"
port: 8001
health_timeout: 240

container_env:
  - "HF_HOME=/.cache/huggingface/"
  - "HF_HUB_CACHE=/.cache/huggingface"
  - "HF_TOKEN=${HF_TOKEN}"
  - "VLLM_ROCM_USE_AITER=1"
  - "CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7"

extra_container_mounts:
  - "/home/sabre/sashao:/dockerx"

docker_run_args:
  group_add: ["video"]
  cap_add: ["SYS_PTRACE"]
  security_opt: ["seccomp=unconfined"]
  devices:
    - "/dev/kfd"
    - "/dev/dri"
    - "/dev/dri:/dev/dri"
    - "/dev/kfd:/dev/kfd"
  privileged: true
  ipc_mode: "host"

server_args:
  - "--host localhost"
  - "--dtype auto"
  - "--tensor-parallel-size 8"
  - "--max-num-seqs 256"
  - "--distributed-executor-backend mp"
  - "--trust-remote-code"
  - "--gpu-memory-utilization 0.6"
  - "--moe-backend aiter"
  - "--tokenizer-mode deepseek_v4"
  - "--reasoning-parser deepseek_v4"
  - "--kv-cache-dtype fp8"
  - "--compilation-config '{\"mode\":3,\"cudagraph_mode\":\"FULL_AND_PIECEWISE\"}'"
  - "--speculative-config '{\"method\":\"mtp\",\"num_speculative_tokens\":2}'"

longform_max_tokens: 2048
enable_thinking: false
longform_prompts:
  - "请写一篇关于大模型推理服务性能优化的技术说明，包含吞吐、延迟、批处理和显存四个方面。"
  - "Explain how speculative decoding can improve LLM serving throughput, and discuss when it may hurt quality or latency."

