# DeepSeek-V4-Pro vLLM TP8 1K/1K throughput using vLLM ROCm image.
image: "vllm/vllm-openai-rocm:v0.22.0"
container_name: "vllm-bench-dsv4"
entrypoint: "/bin/bash"
command:
  - "-lc"
  - "while true; do sleep 3600; done"

model_path: "deepseek-ai/DeepSeek-V4-Pro"
model_prefix: "deepseek_v4_pro"
host_model_mount_path: "/home/sabre/model"

precision: "fp4"
runner_type: "mi355x"
framework: "vllm"
port: 8001
health_timeout: 1800
eval_tasks: gsm8k
eval_num_fewshot: 5
eval_limit: 100
post_start_commands:
  - "python3 -m pip install git+https://github.com/EleutherAI/lm-evaluation-harness.git tenacity"

container_env:
  - "HF_HOME=/.cache/huggingface/"
  - "HF_HUB_CACHE=/.cache/huggingface"
  - "HF_TOKEN=${HF_TOKEN}"
  - "VLLM_ROCM_USE_AITER=1"
  - "CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7"

extra_container_mounts:
  - "/home/sabre/model:/.cache/huggingface"
  - "/home/sabre/sashao:/dockerx"

docker_run_args:
  group_add: ["video"]
  cap_add: ["SYS_PTRACE"]
  security_opt: ["seccomp=unconfined"]
  devices:
    - "/dev/kfd"
    - "/dev/dri"
    - "/dev/dri:/dev/dri"
    - "/dev/kfd:/dev/kfd"
  privileged: true
  ipc_mode: "host"

server_args:
  - "--host localhost"
  - "--dtype auto"
  - "--tensor-parallel-size 8"
  - "--max-model-len 8192"
  - "--max-num-seqs 256"
  - "--distributed-executor-backend mp"
  - "--trust-remote-code"
  - "--gpu-memory-utilization 0.6"
  - "--moe-backend aiter"
  - "--tokenizer-mode deepseek_v4"
  - "--reasoning-parser deepseek_v4"
  # - "--kv-cache-dtype fp8_e4m3"
  - "--kv-cache-dtype fp8_e4m3"
  - "--compilation-config '{\"mode\":3,\"cudagraph_mode\":\"FULL_AND_PIECEWISE\"}'"

random_range_ratio: 0.8
request_rate: "inf"
burstiness: 1.0
num_warmups: 128
benchmark_ignore_eos: true

test_configs:
  - concurrency: 64
    isl: 1024
    osl: 1024
    num_prompts: 640

