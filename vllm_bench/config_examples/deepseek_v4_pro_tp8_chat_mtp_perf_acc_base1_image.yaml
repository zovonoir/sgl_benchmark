# DeepSeek-V4-Pro vLLM TP8 single-shot chat using perf_acc_base1 image.
image: "vllm/vllm-openai-rocm:perf_acc_base1"
container_name: "vllm-bench-dsv4-chat"
entrypoint: "/bin/bash"
command:
  - "-lc"
  - "while true; do sleep 3600; done"

model_path: "deepseek-ai/DeepSeek-V4-Pro"
model_prefix: "deepseek_v4_pro_chat"
host_model_mount_path: "/home/sabre/model"

run_mode: "chat"
precision: "fp4"
runner_type: "mi355x"
framework: "vllm"
port: 8001
health_timeout: 240

container_env:
  - "HF_HOME=/.cache/huggingface/"
  - "HF_HUB_CACHE=/.cache/huggingface"
  - "HF_TOKEN=${HF_TOKEN}"
  - "VLLM_ROCM_USE_AITER=1"
  - "CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7"

extra_container_mounts:
  - "/home/sabre/sashao:/dockerx"

docker_run_args:
  group_add: ["video"]
  cap_add: ["SYS_PTRACE"]
  security_opt: ["seccomp=unconfined"]
  devices:
    - "/dev/kfd"
    - "/dev/dri"
    - "/dev/dri:/dev/dri"
    - "/dev/kfd:/dev/kfd"
  privileged: true
  ipc_mode: "host"

server_args:
  - "--host localhost"
  - "--dtype auto"
  - "--tensor-parallel-size 8"
  - "--max-num-seqs 256"
  - "--distributed-executor-backend mp"
  - "--trust-remote-code"
  - "--gpu-memory-utilization 0.6"
  - "--moe-backend aiter"
  - "--tokenizer-mode deepseek_v4"
  - "--reasoning-parser deepseek_v4"
  - "--kv-cache-dtype fp8"
  - "--compilation-config '{\"mode\":3,\"cudagraph_mode\":\"FULL_AND_PIECEWISE\"}'"
  # MTP is intentionally disabled for open-ended chat quality checks.
  # - "--speculative-config '{\"method\":\"mtp\",\"num_speculative_tokens\":2}'"

# chat_prompt: "请用中文详细解释 vLLM 是什么，并说明它在大模型推理服务中如何提升吞吐、降低延迟。"
chat_stream: false
chat_max_tokens: 4096
chat_temperature: 0.0
enable_thinking: true

