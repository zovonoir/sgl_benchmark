# DeepSeek-V4-Pro vLLM TP8 throughput/eval/profile quality recipe.
image: "vllm/vllm-openai-rocm:perf_acc_base1"
container_name: "vllm-bench-dsv4"
entrypoint: "/bin/bash"
command:
  - "-lc"
  - "while true; do sleep 3600; done"

model_path: "deepseek-ai/DeepSeek-V4-Pro"
model_prefix: "deepseek_v4_pro"
host_model_mount_path: "/home/sabre/model"

precision: "fp4"
runner_type: "mi355x"
framework: "vllm"
port: 8001
health_timeout: 1800
eval_tasks: gsm8k
eval_num_fewshot: 20
eval_limit: null
post_start_commands:
  - "python3 -m pip install git+https://github.com/EleutherAI/lm-evaluation-harness.git tenacity"

container_env:
  - "HF_HOME=/.cache/huggingface/"
  - "HF_HUB_CACHE=/.cache/huggingface"
  - "HF_TOKEN=${HF_TOKEN}"
  - "VLLM_ROCM_USE_AITER=1"
  - "CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7"

extra_container_mounts:
  - "/home/sabre/model:/.cache/huggingface"
  - "/home/sabre/sashao:/dockerx"

docker_run_args:
  group_add: ["video"]
  cap_add: ["SYS_PTRACE"]
  security_opt: ["seccomp=unconfined"]
  devices:
    - "/dev/kfd"
    - "/dev/dri"
    - "/dev/dri:/dev/dri"
    - "/dev/kfd:/dev/kfd"
  privileged: true
  ipc_mode: "host"

server_args:
  - "--host localhost"
  - "--dtype auto"
  - "--tensor-parallel-size 8"
  - "--max-model-len 8192"
  - "--max-num-seqs 256"
  - "--distributed-executor-backend mp"
  - "--trust-remote-code"
  - "--gpu-memory-utilization 0.6"
  - "--moe-backend aiter"
  - "--tokenizer-mode deepseek_v4"
  - "--reasoning-parser deepseek_v4"
  # - "--kv-cache-dtype fp8_e4m3"
  - "--kv-cache-dtype fp8"
  - "--compilation-config '{\"mode\":3,\"cudagraph_mode\":\"FULL_AND_PIECEWISE\"}'"
  # - "--speculative-config '{\"method\":\"mtp\",\"num_speculative_tokens\":2}'"

random_range_ratio: 1.0
request_rate: "inf"
burstiness: 1.0
num_warmups: 128
benchmark_ignore_eos: true

test_configs:
  - concurrency: 64
    isl: 1024
    osl: 1024
    num_prompts: 640

  - concurrency: 256
    isl: 1024
    osl: 1024
    num_prompts: 512

profile_configs:
  - concurrency: 64
    isl: 1024
    osl: 5
    num_prompts: 64
    profile_with_stack: true

multiturn_max_tokens: 2048
multiturn_turns:
  - "我叫李明，来自上海。请记住这些信息，然后用三句话介绍 vLLM 在大模型推理服务中的作用。"
  - "我们正在测试 DeepSeek-V4-Pro，前面我说我叫什么、来自哪里？另外请说明 TP8 推理中 batching 为什么重要。"
  - "请回答：我的姓名、城市、测试的模型名称分别是什么？再给出一个简短的性能测试建议。"
