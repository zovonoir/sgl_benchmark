# Qwen3.5-397B — custom long natural-text prompt repro via /v1/completions
existing_container: zov-upgrade-test1
model_path: "/.cache/huggingface/Qwen3.5-35B-A3B-FP8"
model_prefix: "Qwen3.5-35B-A3B-FP8"
host_model_mount_path: "/raid/models"

run_mode: benchmark
bench_backend: sglang
precision: fp8
port: 30036

container_env:
  - "HF_HOME=/.cache/huggingface/"
  - "SGLANG_DISABLE_CUDNN_CHECK=1"
  - "SGLANG_USE_CUDA_IPC_TRANSPORT=1"
  - "SGLANG_VLM_CACHE_SIZE_MB=8192"
  - "SGLANG_USE_AITER=1"
  - "SGLANG_ROCM_USE_AITER_LINEAR_SHUFFLE=1"
  - "SGLANG_ROCM_USE_AITER_LINEAR_FP8HIPB=1"
  - "SGLANG_USE_AITER_NEW_CA=false"
  - "AITER_QUICK_REDUCE_QUANTIZATION=INT4"
  - "SGLANG_AITER_FP8_PREFILL_ATTN=0"
  - "ATOM_ENABLE_QK_NORM_ROPE_CACHE_QUANT_FUSION=0"
  - "HIP_VISIBLE_DEVICES=7"
  - "CUDA_VISIBLE_DEVICES=7"
  - "SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models"
  - "ATOM_ENABLE_GDN_DECODE_LOSSY_FAST=1"
  - "ATOM_POSTPONE_MOE_ALL_REDUCE=1"
  - "PYTHONPATH=/sgl-workspace/ATOM:/sgl-workspace/sglang/python:/sgl-workspace/mori:/sgl-workspace/aiter"

docker_run_args:
  shm_size: "128g"
  cap_add: ["SYS_PTRACE"]
  security_opt: ["seccomp=unconfined"]
  user: "root"
  devices: ["/dev/kfd", "/dev/dri"]
  group_add: ["video"]
  ipc_mode: "host"
  pid_mode: "host"
  network_mode: "host"
  privileged: true
  ulimits:
    core:
      soft: 0
      hard: 0

server_args:
  - "--attention-backend aiter"
  - "--reasoning-parser qwen3"
  - "--trust-remote-code"
  - "--chunked-prefill-size 16384"
  - "--mem-fraction-static 0.95"
  - "--max-prefill-tokens 16384"
  - "--max-running-requests 256"
  - "--disable-radix-cache"

test_configs:
  - concurrency: 224
    isl: 4096
    osl: 2048
    num_prompts: 448

post_start_commands:
  - "cd /sgl-workspace/ATOM && pip install -e ."
