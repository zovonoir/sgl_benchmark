# Qwen3.5-27B — SGLang + ATOM plugin
# ISL=4096, OSL=2048, 并发224, 448 prompts, TP1
image: "atom-sglang:opt2"
model_path: "/.cache/huggingface/Qwen3.5-27B"
model_prefix: "qwen3.5_moe"
host_model_mount_path: "/raid/models"

run_mode: chat
bench_backend: sglang
precision: fp8
port: 37654

container_env:
  - "SGLANG_DISABLE_CUDNN_CHECK=1"
  - "SGLANG_USE_CUDA_IPC_TRANSPORT=1"
  - "SGLANG_VLM_CACHE_SIZE_MB=8192"
  - "SGLANG_USE_AITER=1"
  - "SGLANG_ROCM_USE_AITER_LINEAR_SHUFFLE=1"
  - "SGLANG_ROCM_USE_AITER_LINEAR_FP8HIPB=1"
  - "SGLANG_USE_AITER_NEW_CA=false"
  - "SGLANG_EXTERNAL_MODEL_PACKAGE=atom.plugin.sglang.models"
  - "AITER_QUICK_REDUCE_QUANTIZATION=INT4"
  - "SGLANG_AITER_FP8_PREFILL_ATTN=0"
  - "HIP_VISIBLE_DEVICES=0,1"
  - "CUDA_VISIBLE_DEVICES=0,1"

server_args:
  - "--attention-backend aiter"
  - "--reasoning-parser qwen3"
  - "--trust-remote-code"
  - "--chunked-prefill-size 16384"
  - "--mem-fraction-static 0.95"
  - "--max-prefill-tokens 16384"
  - "--max-running-requests 224"
  - "--disable-radix-cache"
  - "--tensor-parallel-size 2"

test_configs:
  - concurrency: 224
    isl: 4096
    osl: 2048
    num_prompts: 448
